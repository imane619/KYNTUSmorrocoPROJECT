version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/ShiftMaster.Gateway/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  auth:
    build:
      context: .
      dockerfile: src/Services/Auth/ShiftMaster.Auth.API/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=shiftmaster_auth;Username=postgres;Password=postgres"

  employee:
    build:
      context: .
      dockerfile: src/Services/Employee/ShiftMaster.Employee.API/Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=shiftmaster_employee;Username=postgres;Password=postgres"

  planning:
    build:
      context: .
      dockerfile: src/Services/Planning/ShiftMaster.Planning.API/Dockerfile
    ports:
      - "5003:8080"
    depends_on:
      - employee
      - absence
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=shiftmaster_planning;Username=postgres;Password=postgres"
      Services__Employee__Url: "http://employee:8080/"
      Services__Absence__Url: "http://absence:8080/"

  absence:
    build:
      context: .
      dockerfile: src/Services/Absence/ShiftMaster.Absence.API/Dockerfile
    ports:
      - "5004:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=shiftmaster_absence;Username=postgres;Password=postgres"

  analytics:
    build:
      context: .
      dockerfile: src/Services/Analytics/ShiftMaster.Analytics.API/Dockerfile
    ports:
      - "5005:8080"

  reporting:
    build:
      context: .
      dockerfile: src/Services/Reporting/ShiftMaster.Reporting.API/Dockerfile
    ports:
      - "5006:8080"

  notification:
    build:
      context: .
      dockerfile: src/Services/Notification/ShiftMaster.Notification.API/Dockerfile
    ports:
      - "5007:8080"
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
